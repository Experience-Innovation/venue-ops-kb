# Venue Operations KB — Controlled Vocabulary
# Version: 3.0 (Session D2 — added governance_type controlled vocabulary, lifecycle, audit_outcome)
# Previous: 2.0 (Session 10 — 26-domain taxonomy, Q3-Q5 alignment, GLRC transparency)
# All notes MUST use values from these lists for controlled fields.
# Claude Code: validate against this file before writing any note.
# Reference: VEP-KB-Data-Science-Methodology_v1.0.md, SCHEMA.yaml v3.0

note_type:
  - domain          # Domain overview (26 total — Decision #30)
  - concept         # Operational concept within a domain
  - standard        # Regulatory standard, code, or certification
  - technology      # Platform, tool, or system
  - organization    # Industry body or association
  - person          # Industry practitioner or thought leader
  - source          # Citation/reference note
  - map             # MOC or ecosystem overview

status:
  # Progressive deepening model (Q4): draft → reviewed → canonical
  - draft           # Initial extraction from research (minimum viable)
  - reviewed        # Human-verified, working depth achieved
  - canonical       # Authoritative reference, full provenance chain
  - archived        # Superseded or deprecated

confidence:
  # Quantification tiers (Q3) — no "unverified" tier; use status: draft + confidence: low
  - high            # Directly stated in DR source with verifiable citation
  - medium          # Inferred from multiple sources or corroborated across batches
  - low             # Single source, indirect reference, or expert opinion

priority:
  - critical        # Core operational function — every venue type
  - high            # Important operational domain — most venue types
  - medium          # Supporting function — venue-type dependent
  - low             # Peripheral or niche — specialist venues only

