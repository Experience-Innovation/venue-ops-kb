# ============================================================
# 7-TYPE RELATIONSHIP TAXONOMY (Decision #31, locked Session 9)
# Directional pairs where indicated. Stored in frontmatter as
# underscore-separated keys with link-valued arrays.
# ============================================================
relationship_type:
  - parent_of       # Hierarchical containment (directed, pair: child_of)
  - child_of        # Inverse of parent_of
  - implements      # Concept realizes a standard/framework (directed)
  - governed_by     # Regulatory or policy constraint (directed)
  - supported_by    # Enabling technology or system (directed)
  - related_to      # Meaningful operational connection (undirected)
  - varies_by       # Dimension-dependent variation (directed)
  - scales_with     # Changes proportionally with a factor (directed)

# ============================================================
# CROSS-CUTTING DIMENSIONS (Decision #35, locked Session 10)
# Applied to every knowledge note where relevant
# ============================================================
venue_type:
