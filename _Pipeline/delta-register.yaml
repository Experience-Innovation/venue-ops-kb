# ============================================================
# SCHEMA
# ============================================================
schema:
  id: "DELTA-NNN (sequential, zero-padded)"
  category: "provenance | vocabulary | citation | consistency | obsidian | traceability | confidence | other"
  severity: "critical | high | medium | low"
  status: "open | in-progress | resolved-inline | resolved-batch | deferred | accepted"
  discovered_session: "S-NN"
  discovered_date: "YYYY-MM-DD"
  affected_notes: "list of file paths or wikilinks"
  affected_count: "integer (for scans covering many notes)"
  finding: "brief description of the issue"
  detection_method: "automated_scan | manual_audit | validation_report | user_report"
  resolution_path: "description of how this will be / was fixed"
  target_session: "S-NN (when deferred)"
  resolved_session: "S-NN (when resolved)"
  resolved_date: "YYYY-MM-DD (when resolved)"
  resolution_evidence: "commit hash | validation report path | file paths modified"
  notes: "additional context"

# ============================================================
# ACCEPTED RESOLUTION PATHS
# ============================================================
resolution_paths:
  - id: "inline-fix"
    description: "Fixed in-session during the audit phase that discovered it. Deterministic rule-based fix."
  - id: "batch-fix"
    description: "Fixed in a dedicated remediation phase later in the same session. Grouped with similar findings."
  - id: "scheduled-fix"
    description: "Deferred to a specific future session (target_session field populated)."
  - id: "escalated"
    description: "Surfaced to Alex for scope/policy decision. Awaiting direction."
  - id: "accepted"
    description: "Alex accepted the finding as out-of-scope or wont-fix with documented rationale."

# ============================================================
# SEVERITY DEFINITIONS
# ============================================================
severity_definitions:
  critical: "Blocks Obsidian mountability OR publishes false/fabricated information. Must fix same session."
  high: "Violates a CLAUDE.md Hard Rule OR breaks provenance chain OR breaks claim-to-source traceability. Fix within current initiative."
  medium: "Editorial/consistency issue affecting academic rigor. Fix within initiative scope."
  low: "Polish item. May defer to Phase E if scope pressure."

# ============================================================
# CATEGORY DEFINITIONS
# ============================================================
category_definitions:
  provenance: "GLRC provenance chain completeness (ai_disclosure, extraction_model, research_batch, sources)"
  vocabulary: "Controlled vocabulary drift or violation vs VOCABULARY.yaml"
  citation: "Source note bibliographic metadata gaps or inconsistencies"
  consistency: "Editorial / structural consistency across notes within a domain"
  obsidian: "Vault mountability, broken links, graph integrity, Dataview query errors"
  traceability: "Claim-to-source traceability gaps in concept body text"
  confidence: "Confidence tier assignment defensibility"
  other: "Anything not matching above categories"

